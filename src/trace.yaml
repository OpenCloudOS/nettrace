---
name: all
desc: trace the whole kernel network stack
common_rules:
  define: &rule_ret_err
    exp: ne 0
    level: error
  define: &rules_nf
    - exp: eq 0
      level: error
      msg: packet is dropped
      adv: check your netfilter rule
    - exp: eq 1
      level: info
      msg: packet is accepted
  define: &rule_msg
    - exp: any
      level: info
children:
- name: link
  desc: link layer (L2) of the network stack
  children:
  - name: link-in
    desc: link layer (L2) of packet in
    visual: true
    children:
    - name: napi_gro_receive_entry
      tp: net/napi_gro_receive_entry
    - name: dev_gro_receive
      rules:
      - exp: eq 4
        level: error
        msg: packet is dropped by GRO
    - name: enqueue_to_backlog
      analyzer: ret
      monitor: 1
      rules:
      - <<: *rule_ret_err
        msg: failed to enqeueu to CPU backlog
        adv: increase the /proc/sys/net/core/netdev_max_backlog
    - name: netif_receive_generic_xdp
      analyzer: ret
      rules:
      - exp: eq 1
        level: error
        msg: packet is dropped by XDP program
        adv: check your XDP eBPF program
      - exp: eq 3
        level: info
        msg: packet is transmited by XDP program
      - exp: eq 4
        level: info
        msg: packet is redirected by XDP program
    - name: xdp_do_generic_redirect
      analyzer: ret
      monitor: 1
      rules:
      - <<: *rule_ret_err
        msg: XDP failed to redirect skb
        adv: check if the target ifindex exist
    - name: netif_receive_skb
      tp: net/netif_receive_skb
  - name: link-out
    desc: link layer (L2) of packet out
    visual: true
    children:
    - name: __dev_queue_xmit
      analyzer: ret
      monitor: 1
      rules:
      - <<: *rule_ret_err
        msg: failed to queue packet to qdisc
        adv: too complex to say
    - name: dev_hard_start_xmit
      rules:
      - <<: *rule_msg
        msg: skb is successfully sent to the NIC driver
  - name: sched
    desc: TC(traffic control) module
    visual: true
    children:
    - tcf_classify
    - cls_bpf_classify
    - tcf_bpf_act
    - name: qdisc_dequeue
      tp: qdisc/qdisc_dequeue
      custom: true
      analyzer: qdisc
    - name: qdisc_enqueue
      tp: qdisc/qdisc_enqueue
      custom: true
      analyzer: qdisc
  - name: ipvlan
    desc: ipvlan network interface
    default: false
    visual: true
    children:
    - ipvlan_queue_xmit
    - ipvlan_handle_frame
    - ipvlan_rcv_frame
    - ipvlan_xmit_mode_l3
    - ipvlan_process_v4_outbound
  - name: bridge
    desc: bridge network interface
    default: false
    visual: true
    children:
    - name: br_nf_pre_routing
      analyzer: ret
      msg: ebtable in PREROUTING
      rules: *rules_nf
    - name: br_nf_forward_ip
      analyzer: ret
      msg: ebtable in FORWARD
      rules: *rules_nf
    - name: br_nf_forward_arp
      analyzer: ret
      msg: ebtable in FORWARD
      rules: *rules_nf
    - name: br_nf_post_routing
      analyzer: ret
      msg: ebtable in POST_ROUTING
      rules: *rules_nf
  - name: arp
    visual: true
    desc: arp protocol
    children:
    - arp_rcv
    - arp_process
  - name: bonding
    visual: true
    desc: bonding netdevice
    children:
    - bond_dev_queue_xmit
  - name: vxlan
    visual: true
    desc: vxlan model
    children:
    - __iptunnel_pull_header
    - vxlan_rcv
    - vxlan_xmit_one
  - name: vlan
    visual: true
    desc: vlan module
    children:
    - name: vlan_do_receive
      custom: 1
    - vlan_dev_hard_start_xmit
  - name: ovs
    visual: true
    desc: openvswitch module
    children:
    - netdev_port_receive
    - ovs_vport_receive
    - ovs_dp_process_packet
- name: packet
  desc: the process of skb of type PF_PACKET
  children:
  - name: pkt-in
    desc: the process of skb of type PF_PACKET
    visual: true
    children:
    - packet_rcv
    - tpacket_rcv
  - name: pkt-output
    desc: the process of skb of type PF_PACKET
    visual: true
    children:
    - packet_direct_xmit
- name: netfilter
  desc: netfilter process(filter, nat, etc)
  children:
  - name: netfilter
    desc: base netfilter entry
    visual: true
    children:
    - name: ipt_do_table
      analyzer: iptable
      monitor: 1
      custom: 1
      rules:
      - exp: eq 0
        level: error
        msg: packet is dropped by iptables/iptables-legacy
        adv: check your iptables rule
      - exp: eq 1
        level: info
        msg: packet is accepted
    - name: nft_do_chain
      analyzer: iptable
      monitor: 1
      custom: 1
      rules:
      - exp: eq 0
        level: error
        msg: packet is dropped by iptables/iptables-nft
        adv: check your iptables rule
      - exp: eq 1
        level: info
        msg: packet is accepted
    - name: nf_nat_manip_pkt
      analyzer: ret
      rules:
      - exp: any
        msg: NAT happens (packet address will change)
        level: warn
    - name: nf_hook_slow
      monitor: 1
      analyzer: nf
      custom: 1
      rules:
      - exp: eq -1
        level: error
        msg: packet is dropped by netfilter (NF_DROP)
        adv: check your netfilter rule
  - name: conntrack
    desc: connection track (used by nat mostly)
    default: false
    visual: true
    children:
    - ipv4_confirm
    - nf_confirm
    - ipv4_conntrack_in
    - nf_conntrack_in
    - ipv4_pkt_to_tuple
    - tcp_new
    - tcp_pkt_to_tuple
    - resolve_normal_ct
    - tcp_packet
    - name: tcp_in_window
      default: true
      analyzer: ret
      monitor: 1
      rules:
      - exp: eq 0
        level: warn
        msg: conntrack window check failed (packet out ordering)
        adv: |
          enable 'nf_conntrack_tcp_be_liberal' with the command
          'echo 1 > /proc/sys/net/netfilter/nf_conntrack_tcp_be_liberal'
    - __nf_ct_refresh_acct
- name: ip
  desc: ip protocol layer (L3) of the network stack
  children:
  - name: ip-in
    desc: ip layer of packet in
    visual: true
    children:
    - ip_rcv
    - ip_rcv_core
    - ip_rcv_finish
    - ip_local_deliver
    - ip_local_deliver_finish
    - ip_forward
    - ip_forward_finish
    - ip6_forward
    - ip6_rcv_finish
    - ip6_rcv_core
    - ipv6_rcv
  - name: ip-out
    desc: ip layer of packet out
    visual: true
    children:
    - name: __ip_queue_xmit
    - __ip_local_out
    - ip_output
    - ip_finish_output
    - ip_finish_output_gso
    - ip_finish_output2
    - ip6_output
    - ip6_finish_output
    - ip6_finish_output2
    - ip6_send_skb
    - ip6_local_out
  - name: xfrm
    desc: xfrm module
    visual: true
    children:
    - xfrm4_output
    - xfrm_output
    - xfrm_output2
    - xfrm_output_gso
    - xfrm_output_resume
    - xfrm4_transport_output
    - xfrm4_prepare_output
    - xfrm4_policy_check
    - xfrm4_rcv
    - xfrm_input
    - xfrm4_transport_input
  - name: esp
    desc: ip layer of packet out
    visual: true
    children:
    - ah_output
    - esp_output
    - esp_output_tail
    - ah_input
    - esp_input
  - name: ip-route
    desc: ip route for packet in and out
    visual: true
    children:
    - name: fib_validate_source
      monitor: 1
      rules:
      - <<: *rule_ret_err
        msg: source address valid failed (properly rp_filter fail)
        adv: |
          check you ip route config or disable rp_filter with command
          'echo 0 > /proc/sys/net/ipv4/conf/all/rp_filter'
    - name: ip_route_input_slow
      monitor: 1
      rules:
      - <<: *rule_ret_err
        msg: failed to route packet in input path
        adv: check packet address and your route
- name: tcp
  desc: tcp protocol layer (L4) of the network stack
  children:
  - name: tcp-in
    desc: tcp layer of packet in
    visual: true
    children:
    - tcp_v4_rcv
    - tcp_v6_rcv
    - tcp_filter
    - tcp_child_process
    - name: tcp_v4_send_reset
      custom: 1
      analyzer: reset
      rules:
      - exp: any
        level: error
        msg: connection reset initiated by transport layer (TCP stack, skb)
    - name: tcp_v6_send_reset
      custom: 1
      analyzer: reset
      rules:
      - exp: any
        level: error
        msg: connection reset initiated by transport layer (TCP stack, skb)
    - tcp_v4_do_rcv
    - tcp_v6_do_rcv
    - tcp_rcv_established
    - &tcp_rcv_state_process
      name: tcp_rcv_state_process
      rules:
      - exp: any
        level: info
        msg: TCP socket state has changed
    - tcp_queue_rcv
    - tcp_data_queue_ofo
    - tcp_ack_probe
    - tcp_ack
    - tcp_probe_timer
    - name: tcp_send_probe0
      rules:
      - exp: any
        level: info
        msg: send zero-window probe packet
    - name: __inet_lookup_listener
      monitor: 1
      analyzer: ret
      rules:
      - exp: eq 0
        level: warn
        msg: tcp port is not listened
        adv: check your target tcp port
    - name: inet6_lookup_listener
      analyzer: ret
      monitor: 1
      rules:
      - exp: eq 0
        level: warn
        msg: tcp port is not listened
        adv: check your target tcp port
    - name: tcp_bad_csum
      tp: tcp/tcp_bad_csum
      monitor: 2
      rules:
      - exp: any
        level: error
        msg: TCP packet has bad csum
  - name: tcp-out
    desc: tcp layer of packet out
    visiual: true
    children:
    - tcp_sendmsg_locked
    - name: tcp_skb_entail
    - name: skb_entail
    - __tcp_push_pending_frames
    - name: __tcp_transmit_skb
      rules:
      - exp: ne 0
        level: warn
        msg: failed to xmit skb to ip layer
    - name: __tcp_retransmit_skb
    - tcp_rate_skb_delivered
- name: udp
  desc: udp protocol layer (L4) of the network stack
  children:
  - name: udp-in
    desc: udp layer of packet in
    visual: true
    children:
    - udp_rcv
    - udp_unicast_rcv_skb
    - udp_queue_rcv_skb
    - xfrm4_udp_encap_rcv
    - xfrm4_rcv_encap
    - __udp_queue_rcv_skb
    - __udp_enqueue_schedule_skb
- name: icmp
  desc: icmp(ping) protocol layer (L4) of the network stack
  children:
  - name: icmp-in
    desc: icmp layer of packet in
    visual: true
    children:
    - icmp_rcv
    - icmp_echo
    - icmp_reply
    - icmpv6_rcv
    - icmpv6_echo_reply
    - ping_rcv
    - __ping_queue_rcv_skb
    - ping_queue_rcv_skb
    - name: ping_lookup
      analyzer: ret
      rules:
      - exp: eq 0
        level: warn
        msg: icmp socket is not founded
        adv: not support
- name: socket
  desc: socket releated hooks
  visiual: true
  children:
  - name: tcp-state
    desc: TCP socket state releated hooks
    children:
    - name: inet_listen
      custom: true
      rules:
      - exp: any
        level: info
        msg: TCP socket begin to listen
    - tcp_v4_destroy_sock
    - name: tcp_close
      rules:
      - exp: any
        level: info
        msg: TCP socket is closed
    - *tcp_rcv_state_process
    - name: tcp_send_active_reset
      custom: 1
      analyzer: reset
      rules:
      - exp: any
        level: error
        msg: connection reset initiated by application (active close, sk)
    - name: tcp_ack_update_rtt
      custom: 1
      analyzer: rtt
  - name: tcp-congestion
    desc: TCP congestion control releated hooks
    children:
    - tcp_write_timer_handler
    - name: tcp_retransmit_timer
      monitor: 2
      rules:
      - exp: any
        level: warn
        msg: TCP retransmission timer out
    - name: tcp_enter_recovery
      rules:
      - exp: any
        level: warn
        msg: TCP enter conguestion recover
    - name: tcp_enter_loss
      rules:
      - exp: any
        level: warn
        msg: TCP enter conguestion loss
    - name: tcp_try_keep_open
      rules:
      - exp: any
        level: info
        msg: TCP enter conguestion open state
    - name: tcp_enter_cwr
      rules:
      - exp: any
        level: info
        msg: TCP enter conguestion CWR state
    - tcp_fastretrans_alert
    - tcp_rearm_rto
    - tcp_event_new_data_sent
    - tcp_schedule_loss_probe
  - name: tcp-retrans
    desc: TCP retransmission releated hooks
    children:
    - name: tcp_rtx_synack
      monitor: 2
    - name: tcp_retransmit_skb
      monitor: 2
    - name: tcp_rcv_spurious_retrans
      monitor: 2
    - name: tcp_dsack_set
      monitor: 2
      rules:
      - exp: any
        level: warn
        msg: spurious retransmission happened
- name: life
  desc: skb clone and free
  visual: true
  children:
  - name: skb_clone
    analyzer: clone
    rules:
    - exp: any
      level: info
      msg: packet is cloned
  - name: consume_skb
    tp: skb/consume_skb
    analyzer: free
    rules:
    - exp: any
      level: info
      msg: packet is freed (normally)
  - name: kfree_skb
    tp: skb/kfree_skb
    custom: 1
    analyzer: drop
    monitor: 1
    rules:
    - exp: any
      level: error
      msg: packet is dropped by kernel
  - name: __kfree_skb
    analyzer: free
  - name: kfree_skb_partial
    analyzer: free
  - name: skb_attempt_defer_free
    analyzer: free
